name: capstone
channels:
  - pytorch
  - nvidia
  - defaults

dependencies:
  - python=3.13
  - pip

  - pip:
    # ── PyTorch (CUDA 11.8) ─────────────────────────────────────────────────
    # If your machine has a different CUDA version, change the +cu118 suffix.
    # CPU-only: replace all +cu118 packages with their plain versions.
    - torch==2.7.1+cu118
    - torchvision==0.22.1+cu118
    - torchaudio==2.7.1+cu118
    --extra-index-url https://download.pytorch.org/whl/cu118

    # ── PyTorch Geometric (must match torch version) ─────────────────────────
    # Install these from the PyG wheel index — do NOT use PyPI for these.
    - torch-geometric==2.7.0
    - torch-scatter==2.1.2+pt27cu118
    - torch-sparse==0.6.18+pt27cu118
    - torch-cluster==1.6.3+pt27cu118
    - torch-spline-conv==1.2.2+pt27cu118
    --find-links https://data.pyg.org/whl/torch-2.7.1+cu118.html

    # ── Data I/O ─────────────────────────────────────────────────────────────
    - numpy==2.3.3
    - pandas==2.3.3
    - laspy==2.7.0

    # ── Machine Learning ─────────────────────────────────────────────────────
    - scikit-learn==1.7.2

    # ── Visualization & Reporting ────────────────────────────────────────────
    - matplotlib==3.10.6
    - seaborn==0.13.2
    - jupyter==1.1.1
    - ipykernel==6.30.1
    - tqdm==4.67.1
